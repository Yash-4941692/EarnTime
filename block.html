<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screen Time Blocked</title>
  <style>
    :root {
      --bg-dark: #07090e;
      --card-glass: rgba(22, 28, 45, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #10b981;
      --danger: #f43f5e;
      --primary: #818cf8;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.1) 0px, transparent 50%);
      color: var(--text-main);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 24px;
    }

    .container {
      background: var(--card-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      padding: 34px;
      border-radius: 20px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .icon-lock {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px auto;
      color: var(--danger);
      filter: drop-shadow(0 0 8px rgba(244, 63, 94, 0.4));
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #ffffff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 26px;
    }

    .balance-badge {
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 10px 20px;
      border-radius: 30px;
      display: inline-block;
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 30px;
      box-shadow: 0 0 12px rgba(244, 63, 94, 0.15);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease-in-out;
      box-sizing: border-box;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-lock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-lock"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <h1>Screen Time Exhausted</h1>
    <p>You have run out of focus-earned screen time. Redirect or open study hub limits now to unlock your recreational websites.</p>
    
    <div class="balance-badge" id="block-remaining-balance">
      Wallet Balance: 0m 00s
    </div>

    <button class="btn btn-primary" id="btn-block-study">Open Study Hub</button>
  </div>

  <script src="block.js"></script>
</body>
</html>
